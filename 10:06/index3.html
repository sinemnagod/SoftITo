<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <title>Document</title>
</head>
<body class="p-6 bg-gray-100">
    <div class="p-6 bg-white">
        <h1 class="text-xl font-bold">Giriş Doğrulama</h1>
        <div class="mb-2">
            <input id="username" type="text" placeholder="Kullanıcı adı (admin)" class="p-2 border">
        </div>
        <div class="mb-4">
            <input type="password" id="password" placeholder="Şifre (1234)" class="p-2 border">
        </div>
        <button id="btn-login" class="p-2 bg-purple-200">Giriş Yap</button>
        <div id="result" class="mt-4 p-2">Lütfen giriş yapın</div>
    </div>


    <script>
        const girisYap=(username,password)=>{
            return new Promise((resolve,reject)=>{ //işlem başarılı gelirse resolve, başarısız gelirse reject uygula, Promise bunu takip eder
                if(username==='admin'&& password==='1234'){
                    resolve({isim:'Ali Veli',rol:'Yönetici',girisZamani:new Date().toLocaleDateString()})
                } else {
                    reject('Hata:Kullanıcı adı veya şifre yanlış')
                }
            })
        }

        document.getElementById('btn-login').addEventListener('click',()=>{
            const uName=document.getElementById('username').value;
            const uPass=document.getElementById('password').value;
            const output=document.getElementById('result');

            girisYap(uName,uPass).then((kullanici)=>{
                output.className='mt-4 bg-green-200';
                output.innerHTML=`<strong>Giriş Başarılı (Onaylandı)</strong> <br>
                İsim:${kullanici.isim}<br>
                Rol:${kullanici.rol}<br>
                Giriş Zamanı:${kullanici.girisZamani}<br>`;
            }).catch((hataMesaji)=>{
                output.className='mt-4 bg-red-200';
                output.innerText=hataMesaji;
            })
        })
    </script>
    
</body>
</html>
